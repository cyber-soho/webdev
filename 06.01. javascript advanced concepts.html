                intro: 'Understanding where your variables live and how they are accessed is crucial for bug-free code. This section explores the visibility range of variables (Scope) and how functions can remember their surrounding state (Closures), which is the primary mechanism for private data in JS.',

                                <div class="bg-white p-5 rounded-xl border border-stone-200 border-t-4 border-t-red-400">

                    <div class="fade-in space-y-8">

                                const { name, age = 18 } = user;<br><br>
                                <span class="text-stone-400">// Array</span><br>
                                const [first, second] = [1, 2, 3];
                            </div>
                        </div>

                        <div class="bg-white p-5 rounded-xl border border-stone-200 shadow-sm">
                            <h4 class="font-bold mb-3 border-b pb-2 text-stone-800">Spread & Rest (...)</h4>
                            <div class="font-mono text-xs text-stone-600 bg-stone-50 p-3 rounded">
                                <span class="text-stone-400">// Spread (expand)</span><br>
                                const custom = { ...defaults, lang: 'fr' };<br><br>
                                <span class="text-stone-400">// Rest (collect)</span><br>
                                function sum(...numbers) { ... }
                            </div>
                        </div>

                        <div class="bg-white p-5 rounded-xl border border-stone-200 shadow-sm">
                            <h4 class="font-bold mb-3 border-b pb-2 text-stone-800">Optional Chaining (?.)</h4>
                            <p class="text-xs text-stone-500 mb-2">Prevents crashes when accessing deep properties.</p>
                            <div class="font-mono text-xs text-stone-600 bg-stone-50 p-3 rounded">
                                <span class="text-red-400">// Crashes if address is null</span><br>
                                const city = user.address.city;<br><br>
                                <span class="text-sage-600">// Safe: returns undefined</span><br>
                                const city = user?.address?.city;
                            </div>
                        </div>

                        <div class="bg-white p-5 rounded-xl border border-stone-200 shadow-sm">
                            <h4 class="font-bold mb-3 border-b pb-2 text-stone-800">Nullish Coalescing (??)</h4>
                            <p class="text-xs text-stone-500 mb-2">Fallback ONLY if null or undefined (not 0 or '').</p>
                            <div class="font-mono text-xs text-stone-600 bg-stone-50 p-3 rounded">
                                0 || 'fallback' &nbsp;<span class="text-stone-400">// -> 'fallback'</span><br>
                                0 ?? 'fallback' &nbsp;<span class="text-sage-600">// -> 0</span><br><br>
                                user?.name ?? 'Unknown'
                            </div>
                        </div>

                    </div>
                `
            },
            {
                id: 'error',
                title: 'Error Handling',
                icon: '🛡️',
                intro: 'Professional code assumes failure. Network requests drop, users input invalid data. Defensive coding using try/catch/finally ensures your application handles these failures gracefully without crashing.',
                content: `
                    <div class="fade-in space-y-6">
                        <div class="bg-stone-900 text-stone-50 rounded-xl p-6 font-mono text-sm shadow-md">
                            <span class="text-pink-400">try</span> {<br>
                            &nbsp;&nbsp;<span class="text-stone-500">// Code that might fail</span><br>
                            &nbsp;&nbsp;<span class="text-pink-400">const</span> data = JSON.<span class="text-blue-400">parse</span>(userInput);<br>
                            } <span class="text-pink-400">catch</span> (error) {<br>
                            &nbsp;&nbsp;<span class="text-stone-500">// Runs ONLY if try throws</span><br>
                            &nbsp;&nbsp;console.<span class="text-blue-400">error</span>(error.message);<br>
                            } <span class="text-pink-400">finally</span> {<br>
                            &nbsp;&nbsp;<span class="text-stone-500">// ALWAYS runs — cleanup UI here</span><br>
                            &nbsp;&nbsp;<span class="text-blue-400">hideSpinner</span>();<br>
                            }
                        </div>

                        <div class="bg-white p-6 rounded-xl border border-stone-200 shadow-sm">
                            <h4 class="font-bold mb-4 flex items-center gap-2"><span class="text-xl">✅</span> Defensive Coding Checklist</h4>
                            <ul class="space-y-3 text-sm text-stone-700">
                                <li class="flex items-start gap-3"><input type="checkbox" checked disabled class="mt-1 accent-sage-600"> <span>Validate all function inputs before using them.</span></li>
                                <li class="flex items-start gap-3"><input type="checkbox" checked disabled class="mt-1 accent-sage-600"> <span>Check <code>response.ok</code> after every <code>fetch()</code>.</span></li>
                                <li class="flex items-start gap-3"><input type="checkbox" checked disabled class="mt-1 accent-sage-600"> <span>Provide fallback values using <code>??</code>.</span></li>
                                <li class="flex items-start gap-3"><input type="checkbox" checked disabled class="mt-1 accent-sage-600"> <span>Never trust data from external APIs or user input.</span></li>
                            </ul>
                        </div>
                    </div>
                `
            }
        ];

        let currentSectionIndex = 0;
        let progressChartInstance = null;
        let visitedSections = new Set([0]);
        let elStep = 0; 

        function initApp() {
            renderNavigation();
            initChart();
            renderSection(0);
        }

        function renderNavigation() {
            const navContainer = document.getElementById('nav-container');
            navContainer.innerHTML = '';
            
            courseData.forEach((section, index) => {
                const isCompleted = visitedSections.has(index);
                const isActive = index === currentSectionIndex;
                
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 text-sm rounded-lg flex items-center justify-between transition-colors ${isActive ? 'bg-white font-semibold text-stone-900 border border-stone-200 shadow-sm' : 'text-stone-600 hover:bg-stone-200/50 hover:text-stone-900'}`;
                
                btn.onclick = () => {
                    currentSectionIndex = index;
                    visitedSections.add(index);
                    renderNavigation();
                    renderSection(index);
                    updateProgress();
                };

                btn.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-lg">${section.icon}</span>
                        <span>${section.title}</span>
                    </div>
                    ${isCompleted ? '<span class="text-sage-600 text-xs">✓</span>' : ''}
                `;
                navContainer.appendChild(btn);
            });
        }

        function renderSection(index) {
            const section = courseData[index];
            const contentContainer = document.getElementById('main-content');
            
            contentContainer.innerHTML = `
                <div class="mb-8 fade-in">
                    <h2 class="text-3xl font-bold text-stone-900 tracking-tight flex items-center gap-3">
                        <span>${section.icon}</span>
                        ${section.title}
                    </h2>
                    <p class="mt-4 text-stone-600 leading-relaxed text-lg border-l-4 border-stone-300 pl-4 py-1">
                        ${section.intro}
                    </p>
                </div>
                <div class="mt-8">
                    ${section.content}
                </div>
                
                <div class="mt-16 pt-8 border-t border-stone-200 flex justify-between items-center fade-in">
                    ${index > 0 ? `<button onclick="navigate(${index - 1})" class="text-sm font-medium text-stone-500 hover:text-stone-900 flex items-center gap-1">← Previous</button>` : '<div></div>'}
                    ${index < courseData.length - 1 ? `<button onclick="navigate(${index + 1})" class="bg-stone-900 text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-stone-800 transition shadow-sm">Next Section →</button>` : '<div class="text-sage-600 font-bold">Module Complete! 🎉</div>'}
                </div>
            `;
            
            elStep = 0; 
        }

        function navigate(index) {
            currentSectionIndex = index;
            visitedSections.add(index);
            renderNavigation();
            renderSection(index);
            updateProgress();
            
            document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function initChart() {
            const ctx = document.getElementById('progressChart').getContext('2d');
            progressChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Completed', 'Remaining'],
                    datasets: [{
                        data: [1, courseData.length - 1],
                        backgroundColor: ['#4a6b63', '#e7e5e4'],
                        borderWidth: 0,
                        cutout: '75%'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: false }
                    },
                    animation: { animateScale: true }
                }
            });
            updateProgressText();
        }

        function updateProgress() {
            const completed = visitedSections.size;
            const remaining = courseData.length - completed;
            
            progressChartInstance.data.datasets[0].data = [completed, remaining];
            progressChartInstance.update();
            updateProgressText();
        }
        
        function updateProgressText() {
            const percent = Math.round((visitedSections.size / courseData.length) * 100);
            document.getElementById('progressText').innerText = percent;
        }

        function simulateClosure() {
            const out1 = document.getElementById('closure-out-1');
            const out2 = document.getElementById('closure-out-2');
            
            out1.innerHTML = '';
            out2.innerHTML = '';
            
            setTimeout(() => {
                out1.innerHTML = '<span class="text-sage-400">→ 1</span>';
                out1.classList.add('fade-in');
                setTimeout(() => {
                    out2.innerHTML = '<span class="text-sage-400">→ 2</span>';
                    out2.classList.add('fade-in');
                }, 600);
            }, 300);
        }

        function simulateEventLoop() {
            const stack = document.getElementById('el-stack');
            const api = document.getElementById('el-api');
            const queue = document.getElementById('el-queue');
            const stackItem1 = document.getElementById('stack-item');
            const stackItem2 = document.getElementById('stack-item-2');
            const apiItem = document.getElementById('api-item');
            const queueItem = document.getElementById('queue-item');
            const out = document.getElementById('el-output');
            
            elStep++;
            
            if(elStep === 1) {
                out.innerText = '';
                stackItem1.classList.remove('hidden');
                stack.classList.add('border-blue-400', 'bg-blue-50/30');
            } else if (elStep === 2) {
                stackItem1.classList.add('hidden');
                stackItem2.classList.remove('hidden');
                out.innerText = '1 ';
            } else if (elStep === 3) {
                stackItem2.classList.add('hidden');
                stack.classList.remove('border-blue-400', 'bg-blue-50/30');
                apiItem.classList.remove('hidden');
                api.classList.add('border-stone-400', 'bg-stone-50');
            } else if (elStep === 4) {
                apiItem.classList.add('hidden');
                api.classList.remove('border-stone-400', 'bg-stone-50');
                queueItem.classList.remove('hidden');
                queue.classList.add('border-sage-400', 'bg-sage-50/30');
            } else if (elStep === 5) {
                queueItem.classList.add('hidden');
                queue.classList.remove('border-sage-400', 'bg-sage-50/30');
                stackItem1.classList.remove('hidden');
                stackItem1.innerText = "cb()";
                stackItem1.className = "bg-sage-100 text-sage-800 p-2 rounded text-xs font-mono text-center mb-2";
                stack.classList.add('border-sage-400', 'bg-sage-50/30');
            } else if (elStep === 6) {
                stackItem1.classList.add('hidden');
                stack.classList.remove('border-sage-400', 'bg-sage-50/30');
                out.innerText += ' -> Timer Done';
                elStep = 0; 
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
